name: Build and Publish Docker Images

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  setup:
    name: Setup Tags
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout Source
        uses: actions/checkout@v5

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=edge,branch=main
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

  build:
    name: build (${{ matrix.suffix }})
    needs: setup
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Determine Application Version
        id: app_version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            base_version="$(tr -d '[:space:]' < version.txt)"
            version="${base_version}-edge.g${GITHUB_SHA:0:7}"
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid SemVer application version: $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build Architecture Layer
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            NZBDAV_VERSION=${{ steps.app_version.outputs.version }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-${{ matrix.suffix }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > /tmp/digests/${{ matrix.suffix }}

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.suffix }}
          path: /tmp/digests/${{ matrix.suffix }}
          retention-days: 1

  merge:
    name: Merge Manifests
    needs: [setup, build]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      # secrets can't be referenced in `if:`, so expose it via env for the guard below
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Download AMD64 digest
        uses: actions/download-artifact@v8
        with:
          name: digests-amd64
          path: /tmp/digests

      - name: Download ARM64 digest
        uses: actions/download-artifact@v8
        with:
          name: digests-arm64
          path: /tmp/digests

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create and Push Multi-Arch Manifests
        env:
          TAGS: ${{ needs.setup.outputs.tags }}
          DOCKERHUB_REPO: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          AMD64_DIGEST=$(cat /tmp/digests/amd64)
          ARM64_DIGEST=$(cat /tmp/digests/arm64)

          SOURCES=(
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${AMD64_DIGEST}"
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${ARM64_DIGEST}"
          )

          for tag in ${TAGS}; do
            echo "Publishing ${tag}"
            docker buildx imagetools create -t "${tag}" "${SOURCES[@]}"

            if [ -n "${DOCKERHUB_USERNAME:-}" ]; then
              version="${tag##*:}"
              dockerhub_tag="docker.io/${DOCKERHUB_USERNAME}/${DOCKERHUB_REPO}:${version}"
              echo "Mirroring ${dockerhub_tag}"
              docker buildx imagetools create -t "${dockerhub_tag}" "${SOURCES[@]}"
            fi
          done
